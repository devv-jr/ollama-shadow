# SearXNG settings for AIRecon
# This file is copied to ~/.airecon/searxng/settings.yml on first run.
# Once copied, AIRecon will NOT overwrite your local copy — edit freely.

use_default_settings: true

general:
  instance_name: "AIRecon Search"
  debug: false

server:
  # secret_key is injected at runtime by AIRecon
  limiter: false
  image_proxy: false
  bind_address: "0.0.0.0"
  port: 8080

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

ui:
  static_use_hash: false
  default_locale: "en"
  query_in_title: false
  infinite_scroll: false
  results_on_new_tab: false

# Engines optimized for security research / OSINT dorking
engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: false

  - name: github
    engine: github
    shortcut: gh
    disabled: false

  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    disabled: false

  - name: reddit
    engine: reddit
    shortcut: re
    disabled: false

  - name: google scholar
    engine: google_scholar
    shortcut: gs
    disabled: false

  - name: google news
    engine: google_news
    shortcut: gn
    disabled: false

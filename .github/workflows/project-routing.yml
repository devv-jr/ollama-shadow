name: Project Board Routing

# Updates the Status column for issues/PRs that are ALREADY in the project.
# Does NOT auto-add new items — only the project owner adds items manually.
#
# Column mapping:
#   enhancement label → Feature
#   bug label         → Bugs
#   closed/merged     → Done

on:
  issues:
    types: [labeled, closed]
  pull_request:
    types: [labeled, closed]

env:
  PROJECT_ID: PVT_kwHOA5U7w84BQ8-i
  STATUS_FIELD_ID: PVTSSF_lAHOA5U7w84BQ8-izg-7KBQ
  OPTION_FEATURE: "4faccbe7"
  OPTION_BUGS: "888ace52"
  OPTION_PROGRESS: "2a2680d5"
  OPTION_DONE: "0aac36d4"

jobs:
  route:
    runs-on: ubuntu-latest
    steps:
      - name: Check token is configured
        run: |
          if [[ -z "${{ secrets.GH_PROJECT_TOKEN }}" ]]; then
            echo "::error::GH_PROJECT_TOKEN secret is not set."
            echo "Create a Classic PAT with 'project' scope at:"
            echo "  https://github.com/settings/tokens"
            echo "Then add it as a repo secret at:"
            echo "  https://github.com/pikpikcu/airecon/settings/secrets/actions"
            exit 1
          fi

      - name: Determine target column
        id: target
        env:
          EVENT: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          LABEL: ${{ github.event.label.name }}
          IS_MERGED: ${{ github.event.pull_request.merged }}
        run: |
          OPTION_ID=""

          if [[ "$ACTION" == "closed" ]]; then
            if [[ "$EVENT" == "pull_request" && "$IS_MERGED" != "true" ]]; then
              echo "PR closed without merge — skipping"
              exit 0
            fi
            OPTION_ID="$OPTION_DONE"
          elif [[ "$ACTION" == "labeled" ]]; then
            case "$LABEL" in
              enhancement) OPTION_ID="$OPTION_FEATURE" ;;
              bug)         OPTION_ID="$OPTION_BUGS" ;;
              *)
                echo "Label '$LABEL' has no column mapping — skipping"
                exit 0
                ;;
            esac
          fi

          echo "option_id=$OPTION_ID" >> "$GITHUB_OUTPUT"

      - name: Get content node ID
        id: content
        if: steps.target.outputs.option_id != ''
        run: |
          if [[ "${{ github.event_name }}" == "issues" ]]; then
            echo "node_id=${{ github.event.issue.node_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "node_id=${{ github.event.pull_request.node_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Find item in project (if exists)
        if: steps.target.outputs.option_id != '' && steps.content.outputs.node_id != ''
        id: find_item
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
          CONTENT_ID: ${{ steps.content.outputs.node_id }}
        run: |
          # Look up the project item ID for this issue/PR — do NOT add if missing
          ITEM_ID=$(gh api graphql \
            -f query='
              query($contentId: ID!) {
                node(id: $contentId) {
                  ... on Issue {
                    projectItems(first: 20) {
                      nodes { id project { id } }
                    }
                  }
                  ... on PullRequest {
                    projectItems(first: 20) {
                      nodes { id project { id } }
                    }
                  }
                }
              }' \
            -f contentId="$CONTENT_ID" \
            --jq "[.data.node.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id] | first // empty")

          if [[ -z "$ITEM_ID" ]]; then
            echo "Item not in project — skipping (owner must add manually)"
            exit 0
          fi

          echo "item_id=$ITEM_ID" >> "$GITHUB_OUTPUT"

      - name: Set status column
        if: steps.target.outputs.option_id != '' && steps.find_item.outputs.item_id != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
          ITEM_ID: ${{ steps.find_item.outputs.item_id }}
          OPTION_ID: ${{ steps.target.outputs.option_id }}
        run: |
          gh api graphql \
            -f query='mutation($p:ID!,$i:ID!,$f:ID!,$v:String!){updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f,value:{singleSelectOptionId:$v}}){projectV2Item{id}}}' \
            -f p="$PROJECT_ID" \
            -f i="$ITEM_ID" \
            -f f="$STATUS_FIELD_ID" \
            -f v="$OPTION_ID"

          echo "✓ Routed item $ITEM_ID to column (option: $OPTION_ID)"
